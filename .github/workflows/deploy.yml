name: Deploy to  LWS 

on:
  push:
    branches: [ main ]

jobs:
  web-deploy:
    name: Deploy 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql
          coverage: none

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --no-dev --optimize-autoloader

      - name: sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./ofca/
          # Ensure we include public assets and exclude unnecessary local/dev files
          exclude: |
            - '**/.git/*'
            - '**/.git/**'
            - 'node_modules/**'
            - 'storage/logs/**'
            - 'storage/framework/sessions/**'
            - 'storage/framework/views/**'
            - 'storage/framework/cache/**'
            - '.env'
            - '.env.example'
            - 'phpunit.xml'
            - 'README.md'
            - 'tests/**'
            - '.github/**'

      - name: Run Migrations via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/ofca
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
